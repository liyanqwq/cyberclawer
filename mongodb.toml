# MongoDB settings used by scrape and filter terminal workflows.
# Precedence is: CLI flags > environment variables > this file > built-in defaults.

[mongodb]
uri = "mongodb://localhost:27017"
database = "avd"
collection = "vulnerabilities"

# Conflict handling for existing type/code records in terminal scrape runs:
# prompt, skip, or overwrite.
conflict = "prompt"

[mongodb.collections]
avd = "vulnerabilities"
hkcert = "hkcert"
cve = "cve"
